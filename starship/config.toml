format = """
$username\
[Ņé░](bg:#FF855A fg:#EC5F67)\
$directory\
[Ņé░](fg:#FF855A bg:#ECBE7B)\
$git_branch\
$git_status\
[Ņé░](fg:#ECBE7B bg:#6DD390)\
$c\
$elixir\
$elm\
$golang\
$haskell\
$java\
$julia\
$nodejs\
$nim\
